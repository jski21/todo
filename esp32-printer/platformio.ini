; ESP32 thermal printer client for Donelist.
; pio run -e esp32dev          ; build
; pio run -e esp32dev -t upload ; flash
; pio device monitor             ; serial debug

[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  adafruit/Adafruit Thermal Printer Library@^1.4.0

build_flags =
  -DCORE_DEBUG_LEVEL=1
  ; Uncomment to build without a real printer attached. ESC/POS bytes are
  ; logged to USB serial as readable text instead of UART2 writes.
  ; -DMOCK_PRINTER
